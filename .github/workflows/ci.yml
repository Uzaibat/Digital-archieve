name: CI — Build, Test, Docker Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/idadrs-api

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       idadrs_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install CMake
        run: sudo apt-get install -y cmake build-essential

      - name: Build native C library
        run: |
          cd src/IDADRS.NativeSearch
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cp build/libsearch_engine.so .

      - name: Restore dependencies
        run: dotnet restore IDADRS.sln

      - name: Build solution
        run: dotnet build IDADRS.sln --no-restore -c Release

      - name: Run tests
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5432;Database=idadrs_test;Username=postgres;Password=postgres"
          Jwt__Secret:   "ci-secret-key-minimum-32-characters!!"
          ASPNETCORE_ENVIRONMENT: CI
        run: dotnet test tests/IDADRS.Tests/IDADRS.Tests.csproj --no-build -c Release --logger trx --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
